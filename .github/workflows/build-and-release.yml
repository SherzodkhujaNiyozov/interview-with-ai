name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      retention_days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get package version
        id: package-version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Copy platform-specific binaries (unique names, no conflicts)
          find artifacts -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          # Copy update metadata files, prefixing with platform to avoid name collisions
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            for f in "$dir"*.yml "$dir"*.yaml; do
              [ -f "$f" ] || continue
              filename=$(basename "$f")
              # latest*.yml files are platform-specific and already uniquely named
              if [[ "$filename" == latest* ]]; then
                cp "$f" "release-assets/$filename"
              # Skip builder-debug.yml — not needed in release assets
              elif [[ "$filename" == "builder-debug"* ]]; then
                continue
              else
                cp "$f" "release-assets/$filename"
              fi
            done
          done
          echo "Release assets:"
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.package-version.outputs.VERSION }}
          name: Release v${{ steps.package-version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: release-assets/*